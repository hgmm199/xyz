<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khởi Động Bot Discord</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1e1e24; color: #fff; padding: 30px; }
        h1 { margin-bottom: 20px; color: #5865F2; text-align: center; font-size: 28px; }
        .container { max-width: 900px; margin: 0 auto; background: #2a2b36; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #3e3f4b; }
        th { background-color: #343644; color: #b9bbbe; }
        tr:hover { background-color: #323442; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; color: white; }
        .btn-start { background-color: #2ecc71; }
        .btn-start:hover { background-color: #27ae60; }
        .btn-stop { background-color: #e74c3c; }
        .btn-stop:hover { background-color: #c0392b; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; background: #4f545c; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Bảng Điều Khiển Token Bot</h1>
    <table>
        <thead>
            <tr>
                <th>Tên Profile</th>
                <th>Tài khoản (Tag)</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="bot-list">
            <tr>
                <td colspan="4" style="text-align: center; color: #aaa;">Đang tải danh sách profile...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Hàm lấy data từ API Backend và render ra HTML
    async function loadBotStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            const tbody = document.getElementById('bot-list');
            
            if (Object.keys(data).length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #aaa;">Không tìm thấy profile nào trong thư mục /profiles</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            for (const [profileName, info] of Object.entries(data)) {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${profileName}</strong></td>
                        <td>${info.user}</td>
                        <td><span class="status-badge">${info.status}</span></td>
                        <td>
                            <button class="btn btn-start" onclick="controlBot('start', '${profileName}')">Mở</button>
                            <button class="btn btn-stop" onclick="controlBot('stop', '${profileName}')">Tắt</button>
                        </td>
                    </tr>
                `;
            }
        } catch (e) {
            console.error("Lỗi cập nhật giao diện:", e);
        }
    }

    // Hàm gửi lệnh Bật/Tắt về Backend khi bấm nút
    async function controlBot(action, profile) {
        await fetch('/api/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, profile })
        });
        loadBotStatus(); // Tải lại bảng sau khi bấm
    }

    // Tự động cập nhật trạng thái mỗi 3 giây một lần
    setInterval(loadBotStatus, 3000);
    loadBotStatus();
</script>

</body>
</html>
